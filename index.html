<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>💌 One Question</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff9ec4,#ffc7dd,#ffd8f2,#ffbfd3);
background-size:400% 400%;
animation:bg 12s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:90%;
max-width:430px;
padding:45px;
border-radius:28px;
background:rgba(255,255,255,.18);
backdrop-filter:blur(18px);
box-shadow:0 20px 45px rgba(0,0,0,.15);
text-align:center;
z-index:2;
animation:pop .8s;
}

@keyframes pop{
from{transform:scale(.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

h1{
font-size:33px;
color:white;
margin-bottom:15px;
}

p{
color:white;
opacity:.9;
margin-bottom:35px;
}

button{
padding:15px 34px;
border:none;
border-radius:40px;
font-size:20px;
cursor:pointer;
transition:.3s;
font-weight:bold;
}

#yes{
background:white;
color:#ff4d8d;
box-shadow:0 10px 25px rgba(255,255,255,.4);
}

#yes:hover{
transform:scale(1.08);
}

#no{
position:absolute;
background:#ff4d6d;
color:white;
box-shadow:0 12px 30px rgba(255,0,80,.35);
}

.heart{
position:absolute;
font-size:22px;
animation:float linear infinite;
opacity:.5;
}

@keyframes float{
from{
transform:translateY(100vh) scale(.5);
}
to{
transform:translateY(-120px) scale(1.3);
}
}

.confetti{
position:absolute;
width:10px;
height:10px;
border-radius:50%;
animation:boom 2s forwards;
}

@keyframes boom{
to{
transform:translate(var(--x),var(--y)) rotate(720deg);
opacity:0;
}
}
</style>
</head>

<body>

<div id="hearts"></div>

<div class="card">
<h1>🥺 Чи намайг уучлах уу?</h1>
<p>Нэг л удаа "Yes" дарахад болно... 💖</p>

<button id="yes">Yes 💗</button>
<button id="no">No 🙈</button>
</div>

<script>
const no=document.getElementById("no");

function moveButton(){

const x=Math.random()*(window.innerWidth-120);
const y=Math.random()*(window.innerHeight-70);

no.style.left=x+"px";
no.style.top=y+"px";

no.style.transform=`rotate(${Math.random()*360}deg)
scale(${0.9+Math.random()*0.4})`;
}

moveButton();

no.addEventListener("mouseenter",moveButton);

no.addEventListener("touchstart",e=>{
e.preventDefault();
moveButton();
});

function floatingHearts(){

const h=document.createElement("div");

h.className="heart";
h.innerHTML=Math.random()>.5?"💖":"💕";

h.style.left=Math.random()*100+"vw";
h.style.animationDuration=5+Math.random()*6+"s";
h.style.fontSize=18+Math.random()*28+"px";

document.body.appendChild(h);

setTimeout(()=>h.remove(),12000);

}

setInterval(floatingHearts,300);

document.getElementById("yes").onclick=()=>{

for(let i=0;i<180;i++){

let c=document.createElement("div");
c.className="confetti";

c.style.left=window.innerWidth/2+"px";
c.style.top=window.innerHeight/2+"px";

c.style.background=`hsl(${Math.random()*360},100%,65%)`;

c.style.setProperty("--x",(Math.random()-0.5)*900+"px");
c.style.setProperty("--y",(Math.random()-0.5)*900+"px");

document.body.appendChild(c);

setTimeout(()=>c.remove(),2000);

}

setTimeout(()=>{

document.body.innerHTML=`

<div style="
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ff8ec7,#ffbfd8,#ffe3ef);
overflow:hidden;
">

<div style="font-size:90px;animation:bounce 1s infinite;">
🥹💖
</div>

<h1 style="
color:white;
font-size:58px;
margin-top:15px;
text-shadow:0 5px 20px rgba(0,0,0,.2);
">
So Cute ❤️
</h1>

<p style="
color:white;
font-size:22px;
margin-top:10px;
">
Thank you for forgiving me ✨
</p>

</div>

<style>
@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-18px);}
}
</style>

`;

},900);

}
</script>

</body>
</html>
